pre-commit:
  parallel: false
  commands:
    fmt:
      glob: "*.rs"
      run: cargo fmt --all
      stage_fixed: true
    clippy:
      glob: "*.rs"
      run: cargo clippy --workspace --all-targets --all-features -- -D warnings

pre-push:
  commands:
    test:
      run: cargo test --workspace --all-features
