pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "*.rs"
      run: cargo fmt --all
      stage_fixed: true
    clippy:
      glob: "*.rs"
      run: cargo clippy --fix --allow-dirty --workspace --all-features -- -D warnings
      stage_fixed: true

pre-push:
  commands:
    test:
      run: cargo test --workspace --all-features
